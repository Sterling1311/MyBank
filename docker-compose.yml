services:

  # ─── BASE DE DONNÉES ───────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: mybank_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: mybank
      MYSQL_USER: mybank_user
      MYSQL_PASSWORD: mybank_pass
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mybank_network

  # ─── BACKEND SYMFONY ───────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mybank_backend
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: "mysql://mybank_user:mybank_pass@db:3306/mybank?serverVersion=8.0"
      JWT_SECRET_KEY: "%kernel.project_dir%/config/jwt/private.pem"
      JWT_PUBLIC_KEY: "%kernel.project_dir%/config/jwt/public.pem"
      JWT_PASSPHRASE: "mybank_jwt_passphrase"
    volumes:
      - ./backend:/var/www/html
    depends_on:
      db:
        condition: service_healthy
    networks:
      - mybank_network

  # ─── FRONTEND REACT ────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mybank_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_API_URL=http://localhost:8080
    depends_on:
      - backend
    networks:
      - mybank_network

  # ─── PHPMYADMIN ────────────────────────────────────────────
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: mybank_phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: mybank_user
      PMA_PASSWORD: mybank_pass
    depends_on:
      db:
        condition: service_healthy
    networks:
      - mybank_network

volumes:
  db_data:

networks:
  mybank_network:
    driver: bridge
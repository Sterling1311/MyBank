name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend:
    name: Backend — PHPUnit + PHPStan
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: mybank
          MYSQL_USER: mybank_user
          MYSQL_PASSWORD: mybank_pass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo, pdo_mysql, zip, sodium
          coverage: none

      - name: Create .env file
        working-directory: backend
        run: cp .env.example .env

      - name: Install dependencies
        working-directory: backend
        run: composer install --no-interaction --prefer-dist

      - name: Generate JWT keys
        working-directory: backend
        run: |
          mkdir -p config/jwt
          openssl genpkey -algorithm RSA -out config/jwt/private.pem -pkeyopt rsa_keygen_bits:4096
          openssl rsa -pubout -in config/jwt/private.pem -out config/jwt/public.pem

      - name: Create test database
        run: |
          mysql -h 127.0.0.1 -u root -proot -e "CREATE DATABASE IF NOT EXISTS mybank_test;"
          mysql -h 127.0.0.1 -u root -proot -e "GRANT ALL PRIVILEGES ON mybank_test.* TO 'mybank_user'@'%';"
          mysql -h 127.0.0.1 -u root -proot -e "FLUSH PRIVILEGES;"

      - name: Run migrations
        working-directory: backend
        env:
          APP_ENV: test
          APP_SECRET: testsecret123
          KERNEL_CLASS: App\Kernel
          DATABASE_URL: mysql://mybank_user:mybank_pass@127.0.0.1:3306/mybank?serverVersion=8.0
          JWT_SECRET_KEY: '%kernel.project_dir%/config/jwt/private.pem'
          JWT_PUBLIC_KEY: '%kernel.project_dir%/config/jwt/public.pem'
          JWT_PASSPHRASE: ''
        run: php bin/console doctrine:migrations:migrate --no-interaction --env=test

      - name: Run PHPUnit
        working-directory: backend
        env:
          APP_ENV: test
          APP_SECRET: testsecret123
          KERNEL_CLASS: App\Kernel
          DATABASE_URL: mysql://mybank_user:mybank_pass@127.0.0.1:3306/mybank?serverVersion=8.0
          JWT_SECRET_KEY: '%kernel.project_dir%/config/jwt/private.pem'
          JWT_PUBLIC_KEY: '%kernel.project_dir%/config/jwt/public.pem'
          JWT_PASSPHRASE: ''
        run: php bin/phpunit --no-coverage

      - name: Run PHPStan
        working-directory: backend
        run: php -d memory_limit=512M vendor/bin/phpstan analyse --no-progress --no-ansi

  frontend:
    name: Frontend — ESLint + Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run ESLint
        working-directory: frontend
        run: npx eslint src --ext .ts,.tsx

      - name: Build
        working-directory: frontend
        env:
          VITE_API_URL: http://localhost:8080
        run: npm run build